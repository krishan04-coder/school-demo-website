<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

body{
background:#f4f6f9;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.signup-box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<form>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Create Account</button>

</form>

</div>

</body>
</html>
