<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.notification-box{
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#004aad;
color:white;
border:none;
}

li{
background:#eef2f7;
padding:10px;
margin:5px 0;
border-radius:5px;
}

</style>
</head>

<body>

<div class="notification-box">

<h2>Notification Manager</h2>

<input type="text" id="note" placeholder="Write notification">

<button onclick="addNote()">Add Notification</button>

<ul id="list"></ul>

</div>

<script>

function addNote(){

let note=document.getElementById("note").value;

let li=document.createElement("li");

li.textContent=note;

document.getElementById("list").appendChild(li);

}

</script>

</body>
</html>
