<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
background:linear-gradient(135deg,#004aad,#00a8ff);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
text-decoration:none;
color:#004aad;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<form>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button>Login</button>

<p>Don't have account? <a href="signup.html">Signup</a></p>

</form>

</div>

</body>

</html>
